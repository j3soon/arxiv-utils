<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- USENIX-utils icon: maroon background to distinguish from arxiv-utils (green) -->
  <rect x="0" y="0" width="128" height="128" rx="20" fill="#8a1538"/>
  <!-- Navigation chevrons (back/forward), echoing arxiv-utils -->
  <path d="M 40 34 L 22 64 L 40 94" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <path d="M 88 34 L 106 64 L 88 94" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <!-- "U" mark for USENIX -->
  <path d="M 48 40 L 48 72 Q 48 86 64 86 Q 80 86 80 72 L 80 40" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
